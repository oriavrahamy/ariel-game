<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brawl Percents - באלנס אחוזים</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

<!-- LOBBY SCREEN -->
<div id="lobby-screen" class="screen active">
  <div class="lobby-bg" id="lobby-bg"></div>

  <header class="top-bar">
    <div class="player-left">
      <div class="player-avatar">🎮</div>
      <div class="player-text">
        <span class="player-name" id="player-name">שחקן ו'</span>
        <span class="player-trophies" id="player-trophies">🏆 0</span>
      </div>
    </div>
    <div class="player-right">
      <div class="xp-ring" id="xp-ring">
        <svg viewBox="0 0 36 36">
          <circle cx="18" cy="18" r="15.5" fill="none" stroke="#333" stroke-width="3"/>
          <circle id="xp-circle" cx="18" cy="18" r="15.5" fill="none" stroke="#00E676" stroke-width="3"
            stroke-dasharray="97.4" stroke-dashoffset="97.4" stroke-linecap="round" transform="rotate(-90 18 18)"/>
        </svg>
        <span class="xp-ring-text" id="player-level">1</span>
      </div>
    </div>
  </header>

  <main class="lobby-center">
    <div class="brawler-stage" id="brawler-stage">
      <img class="brawler-hero" id="brawler-hero" src="" alt="">
    </div>
    <div class="brawler-hero-info" id="brawler-hero-info">
      <span class="hero-name" id="hero-name">אריאל העכבר</span>
      <span class="hero-rarity" id="hero-rarity">נפוץ</span>
      <span class="hero-trophies" id="hero-trophies">🏆 0</span>
    </div>
  </main>

  <div class="battle-area">
    <button class="battle-btn" id="btn-start">⚔️ קרב</button>
  </div>

  <nav class="bottom-tabs">
    <button class="bottom-tab" data-tab="brawlers">
      <span class="tab-icon">🤼</span>
      <span class="tab-label">דמויות</span>
    </button>
    <button class="bottom-tab" data-tab="worlds">
      <span class="tab-icon">🗺️</span>
      <span class="tab-label">עולמות</span>
    </button>
    <button class="bottom-tab" data-tab="shop">
      <span class="tab-icon">🛒</span>
      <span class="tab-label">חנות</span>
    </button>
  </nav>
</div>

<!-- BRAWLERS PANEL -->
<div id="brawlers-panel" class="slide-panel">
  <div class="panel-header">
    <button class="panel-close">✕</button>
    <span class="panel-title">🤼 דמויות</span>
  </div>
  <div class="panel-body">
    <div class="brawlers-grid" id="brawlers-grid"></div>
  </div>
</div>

<!-- WORLDS PANEL -->
<div id="worlds-panel" class="slide-panel">
  <div class="panel-header">
    <button class="panel-close">✕</button>
    <span class="panel-title">🗺️ עולמות</span>
  </div>
  <div class="panel-body">
    <div class="worlds-list" id="worlds-list"></div>
  </div>
</div>

<!-- SHOP PANEL -->
<div id="shop-panel" class="slide-panel">
  <div class="panel-header">
    <button class="panel-close">✕</button>
    <span class="panel-title">🛒 חנות</span>
  </div>
  <div class="panel-body">
    <div class="shop-items" id="shop-items"></div>
  </div>
</div>

<!-- PANEL OVERLAY -->
<div id="panel-overlay" class="panel-overlay hidden"></div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div id="game-canvas-container"></div>

  <div id="game-hud">
    <button class="btn-back" id="btn-back">✕</button>
    <div class="hud-level" id="hud-level">שלב 1</div>
    <div class="hud-wave" id="hud-wave">🎯 גל 1/3</div>
  </div>

  <div id="health-bars">
    <div class="health-bar player-health">
      <div class="health-label">
        <span id="player-name-hud">שחקן</span>
        <span id="player-health-text">5000/5000</span>
      </div>
      <div class="health-track">
        <div class="health-fill" id="player-health-fill" style="width: 100%"></div>
        <div class="health-damage" id="player-health-damage"></div>
      </div>
    </div>
    <div class="health-bar enemy-health">
      <div class="health-label">
        <span id="enemy-name-hud">אויב</span>
        <span id="enemy-health-text">2000/2000</span>
      </div>
      <div class="health-track">
        <div class="health-fill" id="enemy-health-fill" style="width: 100%"></div>
        <div class="health-damage" id="enemy-health-damage"></div>
      </div>
    </div>
  </div>

  <div id="question-overlay" class="hidden">
    <div class="question-box">
      <div class="question-topic" id="question-topic">🌲 המרת שברים</div>
      <div class="question-text" id="question-text">מהו 1/2 באחוזים?</div>
      <div class="answers-grid" id="answers-grid"></div>
      <div class="question-feedback hidden" id="question-feedback"></div>
    </div>
  </div>

  <div id="super-bar-container">
    <div class="super-bar-label">💥 אולטי</div>
    <div class="super-bar">
      <div class="super-fill" id="super-fill" style="width: 0%"></div>
    </div>
  </div>

  <div id="powerup-indicator" class="hidden">
    <span id="powerup-icon">🛡️</span>
    <span id="powerup-name">מגן</span>
  </div>

  <div id="attack-effect" class="hidden">
    <div class="effect-text" id="effect-text">🔥 -25%!</div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="results-screen" class="screen">
  <div class="results-container">
    <div class="results-icon" id="results-icon">🏆</div>
    <h2 class="results-title" id="results-title">ניצחון!</h2>
    <div class="results-stats">
      <div class="stat-row">
        <span>גביעים:</span>
        <span class="stat-value" id="results-trophies">+30 🏆</span>
      </div>
      <div class="stat-row">
        <span>דיוק:</span>
        <span class="stat-value" id="results-accuracy">100%</span>
      </div>
      <div class="stat-row">
        <span>נזק:</span>
        <span class="stat-value" id="results-damage-dealt">0</span>
      </div>
    </div>
    <div class="results-tip" id="results-tip"></div>
    <div class="results-buttons">
      <button class="btn-next" id="btn-next">המשך ➜</button>
      <button class="btn-retry" id="btn-retry">🔄 נסה שוב</button>
      <button class="btn-lobby" id="btn-lobby">🏠 תפריט</button>
    </div>
  </div>
</div>

<div id="notification" class="hidden"></div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"
  }
}
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
